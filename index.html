<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すみだドッグパーク｜ご意見ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #1e1e1e;
    --gold: #c9a84c;
    --gold-dim: #7a6228;
    --gold-faint: rgba(201,168,76,0.07);
    --text: #e8e0cc;
    --muted: #555;
    --accent: #e8c96a;
    --font-body: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    --font-display: 'Bebas Neue', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }
  #upload-screen::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 15% 85%, rgba(201,168,76,0.05) 0%, transparent 50%),
      radial-gradient(circle at 85% 15%, rgba(201,168,76,0.03) 0%, transparent 50%);
    pointer-events: none;
  }
  .upload-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .upload-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 10vw, 80px);
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1;
    text-align: center;
    margin-bottom: 8px;
  }
  .upload-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 48px;
  }
  #drop-zone {
    width: min(480px, 90vw);
    border: 1px dashed var(--gold-dim);
    border-radius: 2px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--gold);
    background: var(--gold-faint);
  }
  #drop-zone .dz-icon { font-size: 36px; margin-bottom: 16px; }
  #drop-zone .dz-main {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  #drop-zone .dz-hint { font-size: 12px; color: var(--muted); }
  #csv-input { display: none; }
  .upload-note {
    margin-top: 32px;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.08em;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .header-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 0.1em;
  }
  .header-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-left: 12px;
  }
  .btn-reset {
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 0.1em;
    font-family: var(--font-body);
    transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* Tabs */
  .tabs {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    background: var(--bg);
  }
  .tabs-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-inner::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.15em;
    padding: 14px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* Content */
  .content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 24px 64px;
  }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Card */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* KPI grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .kpi-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px 16px;
    text-align: center;
  }
  .kpi-value {
    font-family: var(--font-display);
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 6px;
  }

  /* Chart grid */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (max-width: 640px) {
    .chart-grid { grid-template-columns: 1fr; }
  }
  .chart-wrap {
    position: relative;
    height: 240px;
  }

  /* Opinions */
  .search-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .search-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    padding: 10px 16px;
    font-size: 13px;
    font-family: var(--font-body);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--gold-dim); }
  .search-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .opinion-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .opinion-card:hover { border-color: var(--gold-dim); }
  .opinion-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 10px;
  }
  .opinion-num {
    font-family: var(--font-display);
    color: var(--gold-dim);
    font-size: 13px;
  }
  .opinion-date { font-size: 11px; color: var(--muted); }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--gold-dim);
    border-radius: 2px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .tag.filled {
    background: rgba(201,168,76,0.12);
    border-color: transparent;
  }
  .opinion-text {
    font-size: 13px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Keyword bars */
  .kw-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
  .kw-row {
    display: grid;
    grid-template-columns: 80px 1fr 36px;
    align-items: center;
    gap: 12px;
  }
  .kw-label { font-size: 12px; color: var(--text); text-align: right; }
  .kw-bar-bg {
    height: 20px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .kw-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .kw-count { font-size: 12px; color: var(--gold); font-family: var(--font-display); font-size: 14px; }

  /* Pie legend */
  .pie-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<!-- ── UPLOAD SCREEN ── -->
<div id="upload-screen">
  <div class="upload-label">PUBLIC MENTOR LAB × Parks Division</div>
  <div class="upload-title">OPINION<br>DASHBOARD</div>
  <div class="upload-sub">すみだドッグパーク ご意見分析</div>
  <div id="drop-zone">
    <div class="dz-icon">📂</div>
    <div class="dz-main">CSVをドロップ or タップ</div>
    <div class="dz-hint">回答CSVファイルをアップロードしてください</div>
    <input type="file" id="csv-input" accept=".csv">
  </div>
  <div class="upload-note">対応列: 回答日時 / 居住地 / 登録者 / 常設希望 / ご意見テキスト</div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="header">
    <div class="header-inner">
      <div style="display:flex;align-items:baseline;">
        <span class="header-title">DOG PARK OPINIONS</span>
        <span class="header-sub">SUMIDA WARD</span>
      </div>
      <button class="btn-reset" onclick="resetDashboard()">← CSV変更</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tabs-inner">
      <button class="tab-btn active" onclick="switchTab('overview',this)">OVERVIEW</button>
      <button class="tab-btn" onclick="switchTab('trend',this)">TREND</button>
      <button class="tab-btn" onclick="switchTab('keywords',this)">KEYWORDS</button>
      <button class="tab-btn" onclick="switchTab('opinions',this)">OPINIONS</button>
    </div>
  </div>

  <div class="content">
    <!-- OVERVIEW -->
    <div id="tab-overview" class="tab-pane active">
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="chart-grid">
        <div class="card">
          <div class="card-title">居住地分布</div>
          <div class="chart-wrap"><canvas id="chart-loc"></canvas></div>
          <div class="pie-legend" id="legend-loc"></div>
        </div>
        <div class="card">
          <div class="card-title">常設希望の内訳</div>
          <div class="chart-wrap"><canvas id="chart-perm"></canvas></div>
          <div class="pie-legend" id="legend-perm"></div>
        </div>
      </div>
    </div>

    <!-- TREND -->
    <div id="tab-trend" class="tab-pane">
      <div class="card">
        <div class="card-title">月別回答数の推移</div>
        <div class="chart-wrap" style="height:320px;"><canvas id="chart-trend"></canvas></div>
      </div>
    </div>

    <!-- KEYWORDS -->
    <div id="tab-keywords" class="tab-pane">
      <div class="card">
        <div class="card-title">意見テキストのキーワード頻度</div>
        <div class="kw-bar-wrap" id="kw-bars"></div>
        <div style="margin-top:16px;font-size:11px;color:var(--muted);">
          ※ ご意見テキスト内でのキーワード出現件数（1件につき1カウント）
        </div>
      </div>
    </div>

    <!-- OPINIONS -->
    <div id="tab-opinions" class="tab-pane">
      <div class="search-bar">
        <input type="text" class="search-input" id="search-input" placeholder="キーワードで絞り込む…" oninput="filterOpinions()">
        <div class="search-count" id="search-count"></div>
      </div>
      <div id="opinions-list"></div>
    </div>
  </div>
</div>

<script>
// ── グローバル ──────────────────────────────────────────
let allData = [];
let charts = {};

const KEYWORDS = [
  "土埃","砂埃","芝生","ウッドチップ","利用時間","開放時間",
  "柵","フェンス","常設","広い","マナー","ゴミ","ロック",
  "チェックイン","小型犬","大型犬","安全","有料",
];

const PIE_COLORS = ["#c9a84c","#5a8a5a","#4a6a9a","#8a4a4a","#7a5a8a","#8a7a4a"];
const GOLD = "#c9a84c";
const GOLD_DIM = "#7a6228";
const BORDER = "#1e1e1e";
const MUTED = "#555";
const TEXT = "#e8e0cc";

// ── CSV パース ─────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split("\n");
  const headers = lines[0].split(",");
  const entries = [];
  let i = 2;
  while (i < lines.length) {
    let row = lines[i];
    while ((row.match(/"/g) || []).length % 2 !== 0 && i < lines.length - 1) {
      i++;
      row += "\n" + lines[i];
    }
    if (row.trim()) {
      const parsed = parseRow(row, headers);
      if (parsed) entries.push(parsed);
    }
    i++;
  }
  return entries;
}

function parseRow(row, headers) {
  const fields = [];
  let cur = "", inQ = false;
  for (let j = 0; j < row.length; j++) {
    const ch = row[j];
    if (ch === '"') {
      if (inQ && row[j+1] === '"') { cur += '"'; j++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      fields.push(cur); cur = "";
    } else {
      cur += ch;
    }
  }
  fields.push(cur);
  const obj = {};
  headers.forEach(function(h, i) { obj[h.trim()] = (fields[i] || "").trim(); });
  return obj["回答番号"] !== "" ? obj : null;
}

function getMonth(dt) {
  if (!dt) return null;
  const m = dt.match(/^(\d{4}-\d{2})/);
  return m ? m[1] : null;
}

// ── ファイル読み込み ────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const csvInput = document.getElementById('csv-input');

dropZone.addEventListener('click', function() { csvInput.click(); });
csvInput.addEventListener('change', function(e) {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', function() {
  dropZone.classList.remove('drag-over');
});
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    allData = parseCSV(e.target.result);
    buildDashboard();
    document.getElementById('upload-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    switchTab('overview', document.querySelector('.tab-btn'));
  };
  reader.readAsText(file, 'UTF-8');
}

function resetDashboard() {
  // チャート破棄
  Object.values(charts).forEach(function(c) { if (c) c.destroy(); });
  charts = {};
  allData = [];
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('csv-input').value = '';
}

// ── タブ切替 ────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── ダッシュボード構築 ──────────────────────────────────
function buildDashboard() {
  const data = allData;
  const total = data.length;
  const withOpinion = data.filter(function(d) { return d["15:text"] && d["15:text"].trim(); }).length;
  const wantPerm = data.filter(function(d) { return d["2:select"] === "はい"; }).length;
  const registered = data.filter(function(d) { return d["1:select"] === "はい"; }).length;
  const resident = data.filter(function(d) { return d["17:select"] === "墨田区"; }).length;
  const outsider = data.filter(function(d) { return d["17:select"] === "墨田区以外"; }).length;

  // KPI
  const kpis = [
    { label: "総回答数", value: total },
    { label: "意見あり", value: withOpinion },
    { label: "常設希望", value: wantPerm },
    { label: "登録者", value: registered },
    { label: "墨田区民", value: resident },
    { label: "区外", value: outsider },
  ];
  const kpiGrid = document.getElementById('kpi-grid');
  kpiGrid.innerHTML = kpis.map(function(k) {
    return '<div class="kpi-card"><div class="kpi-value">' + k.value + '</div><div class="kpi-label">' + k.label + '</div></div>';
  }).join('');

  // 居住地分布
  const locMap = {};
  data.forEach(function(d) {
    const loc = d["17:select"] || "未回答";
    locMap[loc] = (locMap[loc] || 0) + 1;
  });
  const locLabels = Object.keys(locMap);
  const locVals = Object.values(locMap);
  buildPie('chart-loc', 'legend-loc', locLabels, locVals, PIE_COLORS);

  // 常設希望
  const permLabels = ["希望あり", "希望なし/未回答"];
  const permVals = [wantPerm, total - wantPerm];
  buildPie('chart-perm', 'legend-perm', permLabels, permVals, [GOLD, BORDER]);

  // 月別トレンド
  const monthMap = {};
  data.forEach(function(d) {
    const m = getMonth(d["回答日時"]);
    if (m) monthMap[m] = (monthMap[m] || 0) + 1;
  });
  const months = Object.keys(monthMap).sort();
  const monthVals = months.map(function(m) { return monthMap[m]; });
  buildLine('chart-trend', months.map(function(m) { return m.replace('-','/'); }), monthVals);

  // キーワード
  const kwCount = {};
  KEYWORDS.forEach(function(kw) { kwCount[kw] = 0; });
  data.forEach(function(d) {
    const txt = d["15:text"] || "";
    KEYWORDS.forEach(function(kw) { if (txt.includes(kw)) kwCount[kw]++; });
  });
  const kwSorted = Object.entries(kwCount).sort(function(a,b) { return b[1]-a[1]; });
  const maxKw = kwSorted[0] ? kwSorted[0][1] : 1;
  const kwBars = document.getElementById('kw-bars');
  kwBars.innerHTML = kwSorted.map(function(pair) {
    const pct = maxKw > 0 ? (pair[1] / maxKw * 100) : 0;
    return '<div class="kw-row">' +
      '<div class="kw-label">' + pair[0] + '</div>' +
      '<div class="kw-bar-bg"><div class="kw-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="kw-count">' + pair[1] + '</div>' +
      '</div>';
  }).join('');

  // 意見一覧
  renderOpinions(data);
}

function buildPie(canvasId, legendId, labels, vals, colors) {
  if (charts[canvasId]) { charts[canvasId].destroy(); }
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: vals,
        backgroundColor: colors,
        borderWidth: 0,
        hoverOffset: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: GOLD_DIM,
          borderWidth: 1,
          titleColor: GOLD,
          bodyColor: TEXT,
          padding: 10,
        }
      },
      cutout: '60%',
    }
  });
  const legendEl = document.getElementById(legendId);
  legendEl.innerHTML = labels.map(function(l, i) {
    const pct = vals.reduce(function(a,b){return a+b;},0) > 0
      ? Math.round(vals[i] / vals.reduce(function(a,b){return a+b;},0) * 100) : 0;
    return '<span><span class="legend-dot" style="background:' + (colors[i] || '#888') + '"></span>' + l + ' ' + pct + '%</span>';
  }).join('');
}

function buildLine(canvasId, labels, vals) {
  if (charts[canvasId]) { charts[canvasId].destroy(); }
  const ctx = document.getElementById(canvasId).getContext('2d');
  charts[canvasId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: '件数',
        data: vals,
        borderColor: GOLD,
        backgroundColor: 'rgba(201,168,76,0.08)',
        borderWidth: 2,
        pointBackgroundColor: GOLD,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: GOLD_DIM,
          borderWidth: 1,
          titleColor: GOLD,
          bodyColor: TEXT,
          padding: 10,
        }
      },
      scales: {
        x: {
          grid: { color: BORDER },
          ticks: { color: MUTED, font: { size: 11 } },
        },
        y: {
          grid: { color: BORDER },
          ticks: { color: MUTED, font: { size: 11 } },
          beginAtZero: true,
        }
      }
    }
  });
}

// ── 意見一覧 ────────────────────────────────────────────
function renderOpinions(data) {
  const withText = data.filter(function(d) { return d["15:text"] && d["15:text"].trim(); });
  document.getElementById('search-count').textContent = withText.length + '件';
  const list = document.getElementById('opinions-list');
  if (withText.length === 0) {
    list.innerHTML = '<div class="empty-state">意見テキストがありません</div>';
    return;
  }
  list.innerHTML = withText.map(function(d) {
    const loc = d["17:select"] || "";
    const area = d["18:select"] || "";
    const locStr = loc + (area ? ' / ' + area : '');
    const perm = d["2:select"] === "はい";
    const date = (d["回答日時"] || "").slice(0,10);
    return '<div class="opinion-card">' +
      '<div class="opinion-meta">' +
        '<span class="opinion-num">#' + d["回答番号"] + '</span>' +
        '<span class="opinion-date">' + date + '</span>' +
        (locStr ? '<span class="tag">' + locStr + '</span>' : '') +
        (perm ? '<span class="tag filled">常設希望</span>' : '') +
      '</div>' +
      '<div class="opinion-text">' + escHtml(d["15:text"]) + '</div>' +
      '</div>';
  }).join('');
}

function filterOpinions() {
  const q = document.getElementById('search-input').value.trim();
  const filtered = allData.filter(function(d) {
    const txt = d["15:text"] || "";
    if (!txt.trim()) return false;
    if (!q) return true;
    return txt.includes(q) || (d["17:select"] || "").includes(q) || (d["18:select"] || "").includes(q);
  });
  document.getElementById('search-count').textContent = filtered.length + '件';
  const list = document.getElementById('opinions-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">該当する意見がありません</div>';
    return;
  }
  list.innerHTML = filtered.map(function(d) {
    const loc = d["17:select"] || "";
    const area = d["18:select"] || "";
    const locStr = loc + (area ? ' / ' + area : '');
    const perm = d["2:select"] === "はい";
    const date = (d["回答日時"] || "").slice(0,10);
    return '<div class="opinion-card">' +
      '<div class="opinion-meta">' +
        '<span class="opinion-num">#' + d["回答番号"] + '</span>' +
        '<span class="opinion-date">' + date + '</span>' +
        (locStr ? '<span class="tag">' + locStr + '</span>' : '') +
        (perm ? '<span class="tag filled">常設希望</span>' : '') +
      '</div>' +
      '<div class="opinion-text">' + escHtml(d["15:text"]) + '</div>' +
      '</div>';
  }).join('');
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
